name: Deploy WaveTunes

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-site-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy on pa-legg.github.io
        env:
          GH_TOKEN: ${{ secrets.SITE_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "SITE_REPO_TOKEN secret is not set. Deploy manually with:"
            echo "  gh workflow run deploy-wavetunes.yml --repo pa-legg/pa-legg.github.io"
            exit 1
          fi
          gh workflow run deploy-wavetunes.yml --repo pa-legg/pa-legg.github.io
